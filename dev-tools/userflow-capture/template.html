<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Userflows</title>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111;
    --line: #1f1f1f;
    --line-2: #2a2a2a;
    --text: #e8e8e8;
    --muted: #6e6e6e;
    --dim: #3a3a3a;
    --accent: #6b21a8;
    --accent-glow: rgba(107,33,168,0.45);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 ui-sans-serif, -apple-system, "SF Pro Text", Inter, system-ui, sans-serif; }
  code, .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }

  .app { max-width: 1400px; margin: 0 auto; padding: 40px 32px 80px;
    display: grid; grid-template-columns: 220px 1fr; gap: 56px; }
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; gap: 32px; }
  }
  main.content { min-width: 0; }

  /* Sticky left sidebar nav */
  aside.toc { position: sticky; top: 32px; align-self: start;
    max-height: calc(100vh - 64px); overflow-y: auto; padding-right: 4px; }
  @media (max-width: 900px) {
    aside.toc { position: static; max-height: none; }
  }
  aside.toc h3 { font: 600 11px/1 ui-sans-serif, system-ui; letter-spacing: 0.14em;
    color: var(--muted); text-transform: uppercase; margin: 0 0 14px; padding: 0 10px; }
  aside.toc ul { list-style: none; padding: 0; margin: 0; }
  aside.toc a { display: block; font-size: 13px; color: var(--muted); text-decoration: none;
    padding: 7px 10px; border-radius: 6px; line-height: 1.4;
    transition: color .15s, background .15s, border-color .15s;
    border-left: 2px solid transparent; }
  aside.toc a:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  aside.toc a.active { color: var(--text); border-left-color: var(--accent);
    background: rgba(107,33,168,0.08); }

  /* Header */
  header.page { margin-bottom: 40px; }
  header.page h1 { font-size: 28px; margin: 0 0 8px; letter-spacing: -0.01em; }
  header.page p { margin: 0; color: var(--muted); max-width: 80ch; }

  /* Flow section */
  section.flow { margin-top: 56px; scroll-margin-top: 20px; }
  section.flow:first-of-type { margin-top: 0; }
  section.flow > header { margin-bottom: 18px; }
  section.flow > header h2 { font-size: 20px; margin: 0 0 6px; letter-spacing: -0.005em; }
  section.flow > header p { margin: 0; color: var(--muted); max-width: 80ch; }

  /* Diagram (per flow) — vertical CSS grid, tiers = rows, branches = columns */
  .diagram { position: relative; border: 1px solid var(--line); border-radius: 12px;
    background: linear-gradient(180deg, #0c0c0c, #080808); padding: 36px 28px;
    overflow: visible; }
  .grid { position: relative; display: grid; gap: 44px 80px; justify-content: center;
    z-index: 2; }
  .node { background: #1a1a1a; border: 1px solid var(--line-2); border-radius: 10px;
    padding: 16px 18px; min-width: 240px; max-width: 320px; color: var(--text);
    box-shadow: 0 1px 0 rgba(255,255,255,0.02); position: relative; }
  .node .step-num { font: 600 10px/1 ui-sans-serif, system-ui; letter-spacing: 0.12em;
    color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .node .title { font: 600 15px/1.3 ui-monospace, "SF Mono", Menlo, monospace;
    color: #f5f5f5; }
  .node .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* SVG overlay for arrows — clean lines, no badges or inline labels */
  .edges { position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1; overflow: visible; }
  .edges path { fill: none; stroke: var(--accent); stroke-width: 1.5;
    filter: drop-shadow(0 0 4px var(--accent-glow)); }

  /* Step list below diagram */
  ol.steps { list-style: none; padding: 0; margin: 18px 0 0;
    border: 1px solid var(--line); border-radius: 12px; background: var(--panel); }
  ol.steps li { display: grid; grid-template-columns: 28px 1fr; gap: 12px;
    padding: 12px 16px; border-top: 1px solid var(--line); align-items: start; }
  ol.steps li:first-child { border-top: 0; }
  ol.steps .num { width: 22px; height: 22px; border-radius: 50%; background: #2a2a2a;
    color: var(--muted); display: flex; align-items: center; justify-content: center;
    font: 600 11px ui-sans-serif, system-ui; margin-top: 2px; }
  ol.steps .step-title { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: var(--text); }
  ol.steps .step-title .label { color: var(--text); font-weight: 600; margin-left: 8px; }
  ol.steps .step-desc { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .error { padding: 24px; border: 1px solid var(--line); border-radius: 12px;
    background: var(--panel); color: var(--muted); }
</style>
</head>
<body>
<div class="app">
  <aside class="toc">
    <h3>Flows</h3>
    <ul id="toc"></ul>
  </aside>
  <main class="content">
    <header class="page">
      <h1 id="title">Loading…</h1>
      <p id="subtitle"></p>
    </header>
    <div id="flows"></div>
  </main>
</div>

<!--
  Flow data is loaded from the sibling `userflows.js`, which must define
  window.USERFLOWS. Keep the two files side-by-side. See schema.json in
  the userflow-capture skill for the data shape.
-->
<script src="./userflows.js"></script>

<script>
(function () {
  const SVG = "http://www.w3.org/2000/svg";
  const $ = (id) => document.getElementById(id);

  const data = (typeof window !== "undefined" && window.USERFLOWS) || null;
  if (!data) {
    $("title").textContent = "Could not load userflows.js";
    $("subtitle").textContent = "Make sure userflows.js sits next to this HTML file and defines window.USERFLOWS.";
    return;
  }
  if (!data.flows?.length) {
    $("title").textContent = "No flows defined";
    $("subtitle").textContent = "userflows.js loaded but has no flows.";
    return;
  }

  // Header
  $("title").textContent = data.project?.name ? `${data.project.name} — Userflows` : "Userflows";
  $("subtitle").textContent = data.project?.description ?? "";

  // Lookup tables
  const nodeById = new Map((data.nodes || []).map((n) => [n.id, n]));

  // Sidebar TOC
  const tocEl = $("toc");
  data.flows.forEach((f, i) => {
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.href = `#flow-${f.id ?? i}`;
    a.textContent = f.title || `Flow ${i + 1}`;
    a.dataset.target = `flow-${f.id ?? i}`;
    li.appendChild(a);
    tocEl.appendChild(li);
  });

  // Render each flow as its own section
  const flowsEl = $("flows");
  data.flows.forEach((flow, i) => {
    const section = document.createElement("section");
    section.className = "flow";
    section.id = `flow-${flow.id ?? i}`;

    // Header
    const header = document.createElement("header");
    const h2 = document.createElement("h2");
    h2.textContent = flow.title || `Flow ${i + 1}`;
    header.appendChild(h2);
    if (flow.description) {
      const p = document.createElement("p");
      p.textContent = flow.description;
      header.appendChild(p);
    }
    section.appendChild(header);

    // Diagram (CSS grid: rows = tiers, columns = branches)
    const diagram = document.createElement("div");
    diagram.className = "diagram";

    const grid = document.createElement("div");
    grid.className = "grid";
    diagram.appendChild(grid);

    // Compute tier (row) and col for each node.
    // tier = max(source-tier) + 1, walking steps in order so back-edges keep their
    // original lower tier. col: each tier has its own column counter — the first
    // node placed in a tier goes to col 0 (main spine), subsequent (branch
    // targets sharing the tier) get col 1, 2, ...
    const tier = new Map();
    const col = new Map();
    const tierNextCol = new Map();
    const used = new Map();
    const order = [];

    function place(id, t) {
      if (used.has(id)) return;
      tier.set(id, t);
      const c = tierNextCol.get(t) || 0;
      col.set(id, c);
      tierNextCol.set(t, c + 1);
      order.push(id);
      used.set(id, null);
    }

    (flow.steps || []).forEach((s) => {
      if (!used.has(s.from)) place(s.from, 0);
      if (!used.has(s.to)) {
        const sourceTier = tier.get(s.from) ?? 0;
        place(s.to, sourceTier + 1);
      }
    });

    // Determine the incoming step number for each node (the step that brought us here).
    // The start node has no incoming step → no eyebrow.
    const incomingStep = new Map();
    (flow.steps || []).forEach((s, idx) => {
      if (!incomingStep.has(s.to)) incomingStep.set(s.to, idx + 1);
    });

    // Render node cards with explicit grid placement
    order.forEach((id) => {
      const node = nodeById.get(id);
      const el = document.createElement("div");
      el.className = "node";
      el.dataset.id = id;
      el.style.gridRow = String(tier.get(id) + 1);
      el.style.gridColumn = String(col.get(id) + 1);
      const title = node?.title ?? id;
      const sub = node?.subtitle;
      const stepNum = incomingStep.get(id);
      el.innerHTML = `
        ${stepNum ? `<div class="step-num">Step ${stepNum}</div>` : ""}
        <div class="title">${escapeHtml(title)}</div>
        ${sub ? `<div class="sub">${escapeHtml(sub)}</div>` : ""}
      `;
      grid.appendChild(el);
      used.set(id, el);
    });

    // SVG overlay for arrows
    const svg = document.createElementNS(SVG, "svg");
    svg.setAttribute("class", "edges");
    svg.setAttribute("xmlns", SVG);
    diagram.appendChild(svg);

    section.appendChild(diagram);

    // Step list below diagram
    const ol = document.createElement("ol");
    ol.className = "steps";
    (flow.steps || []).forEach((s, idx) => {
      const li = document.createElement("li");
      const fromTitle = nodeById.get(s.from)?.title ?? s.from;
      const toTitle = nodeById.get(s.to)?.title ?? s.to;
      li.innerHTML = `
        <div class="num">${idx + 1}</div>
        <div>
          <div class="step-title">${escapeHtml(fromTitle)} → ${escapeHtml(toTitle)}${
            s.label ? `<span class="label">${escapeHtml(s.label)}</span>` : ""
          }</div>
          ${s.description ? `<div class="step-desc">${escapeHtml(s.description)}</div>` : ""}
        </div>`;
      ol.appendChild(li);
    });
    section.appendChild(ol);

    flowsEl.appendChild(section);

    // Stash refs for arrow rendering
    section._flow = { flow, grid, svg, used, tier, col };
  });

  // Render arrows for every flow (after layout settles)
  function renderAllArrows() {
    document.querySelectorAll("section.flow").forEach((section) => {
      const ctx = section._flow;
      if (!ctx) return;
      drawArrows(ctx);
    });
  }

  function drawArrows({ flow, grid, svg, used, tier, col }) {
    svg.innerHTML = "";
    const containerRect = svg.getBoundingClientRect();

    (flow.steps || []).forEach((s, i) => {
      const fromEl = used.get(s.from);
      const toEl = used.get(s.to);
      if (!fromEl || !toEl) return;

      const a = fromEl.getBoundingClientRect();
      const b = toEl.getBoundingClientRect();
      const ax = a.left - containerRect.left;
      const ay = a.top - containerRect.top;
      const bx = b.left - containerRect.left;
      const by = b.top - containerRect.top;

      const tA = tier.get(s.from), cA = col.get(s.from);
      const tB = tier.get(s.to),   cB = col.get(s.to);

      // Route by grid relationship:
      //   forward + same col   → vertical down arrow (the main spine)
      //   forward + diff col   → diagonal: right/left side of source → top of target
      //   backward (tB <= tA)  → elbow around the right side back up
      let sx, sy, tx, ty, c1x, c1y, c2x, c2y;

      const forward = tB > tA;
      const sameCol = cA === cB;

      if (forward && sameCol) {
        // Vertical: bottom-center → top-center
        sx = ax + a.width / 2; sy = ay + a.height;
        tx = bx + b.width / 2; ty = by;
        const cy = Math.max(20, (ty - sy) * 0.4);
        c1x = sx; c1y = sy + cy;
        c2x = tx; c2y = ty - cy;
      } else if (forward && !sameCol) {
        // Diagonal: leave from the side of source closest to target, enter top of target
        const goingRight = bx + b.width / 2 > ax + a.width / 2;
        sx = goingRight ? ax + a.width : ax;
        sy = ay + a.height / 2;
        tx = bx + b.width / 2;
        ty = by;
        const cx = Math.max(30, Math.abs(tx - sx) * 0.4);
        const cy = Math.max(30, (ty - sy) * 0.4);
        c1x = sx + (goingRight ? cx : -cx); c1y = sy;
        c2x = tx; c2y = ty - cy;
      } else {
        // Backward: elbow around the right side of the diagram, source-right → target-right
        sx = ax + a.width;
        sy = ay + a.height / 2;
        tx = bx + b.width;
        ty = by + b.height / 2;
        const offset = 70;
        c1x = sx + offset; c1y = sy;
        c2x = tx + offset; c2y = ty;
      }

      const path = document.createElementNS(SVG, "path");
      path.setAttribute("d", `M ${sx} ${sy} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${tx} ${ty}`);
      svg.appendChild(path);
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  // Initial draw after layout
  requestAnimationFrame(renderAllArrows);

  // Redraw on resize (debounced)
  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderAllArrows, 80);
  });

  // Scroll spy: highlight the TOC entry for the section currently in view.
  // Default to the first flow on load. Track which flows are currently in the
  // trigger zone; if none are, fall back to the last flow whose top has scrolled
  // above the zone (i.e., what the user is reading past) — or the first flow if
  // we're still above all of them.
  const tocLinks = new Map();
  document.querySelectorAll("aside.toc a").forEach((a) => {
    tocLinks.set(a.dataset.target, a);
  });
  const allSections = Array.from(document.querySelectorAll("section.flow"));
  const intersecting = new Set();

  function setActive(id) {
    if (!id) return;
    document.querySelectorAll("aside.toc a.active").forEach((el) => el.classList.remove("active"));
    tocLinks.get(id)?.classList.add("active");
  }

  function recomputeActive() {
    let id;
    if (intersecting.size > 0) {
      // Topmost intersecting section
      id = [...intersecting].sort((a, b) =>
        document.getElementById(a).getBoundingClientRect().top -
        document.getElementById(b).getBoundingClientRect().top
      )[0];
    } else {
      // Fall back: the last section whose top has scrolled past the trigger zone,
      // or the first section if we're still above all of them.
      const triggerY = window.innerHeight * 0.2;
      const above = allSections.filter((s) => s.getBoundingClientRect().top < triggerY);
      id = (above[above.length - 1] || allSections[0])?.id;
    }
    setActive(id);
  }

  const spy = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) intersecting.add(entry.target.id);
      else intersecting.delete(entry.target.id);
    });
    recomputeActive();
  }, { rootMargin: "-20% 0px -70% 0px" });
  allSections.forEach((s) => spy.observe(s));

  // Initial active on first paint
  setActive(allSections[0]?.id);
})();
</script>
</body>
</html>
