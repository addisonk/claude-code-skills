<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Userflows</title>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111;
    --line: #1f1f1f;
    --line-2: #2a2a2a;
    --text: #e8e8e8;
    --muted: #6e6e6e;
    --dim: #3a3a3a;
    --accent: #f5b32b;
    --accent-glow: rgba(245,179,43,0.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 ui-sans-serif, -apple-system, "SF Pro Text", Inter, system-ui, sans-serif; }
  code, .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }

  .app { max-width: 1400px; margin: 0 auto; padding: 40px 32px 80px; }

  /* Header */
  header.page { margin-bottom: 40px; }
  header.page h1 { font-size: 28px; margin: 0 0 8px; letter-spacing: -0.01em; }
  header.page p { margin: 0 0 18px; color: var(--muted); max-width: 80ch; }
  .toc { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
  .toc a { font-size: 12px; color: var(--muted); text-decoration: none;
    padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px;
    transition: color .15s, border-color .15s, background .15s; }
  .toc a:hover { color: var(--text); border-color: var(--dim); background: var(--panel); }

  /* Flow section */
  section.flow { margin-top: 56px; scroll-margin-top: 20px; }
  section.flow:first-of-type { margin-top: 0; }
  section.flow > header { margin-bottom: 18px; }
  section.flow > header h2 { font-size: 20px; margin: 0 0 6px; letter-spacing: -0.005em; }
  section.flow > header p { margin: 0; color: var(--muted); max-width: 80ch; }

  /* Diagram (per flow) */
  .diagram { position: relative; border: 1px solid var(--line); border-radius: 12px;
    background: linear-gradient(180deg, #0c0c0c, #080808); padding: 32px 28px 110px;
    overflow: visible; }
  .nodes { position: relative; display: flex; flex-wrap: wrap; gap: 56px 64px;
    align-items: flex-start; z-index: 2; }
  .node { background: #0e0e0e; border: 1px solid var(--dim); border-radius: 8px;
    padding: 12px 14px; min-width: 140px; max-width: 220px; color: var(--text);
    box-shadow: 0 1px 0 rgba(255,255,255,0.02); position: relative; }
  .node .title { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px;
    color: #e8e8e8; line-height: 1.3; }
  .node .sub { font-size: 11px; color: #7a7a7a; margin-top: 4px; }
  .node[data-cat]::before { content: ""; display: inline-block; width: 6px; height: 6px;
    border-radius: 2px; margin-right: 6px; vertical-align: middle; background: var(--cat, #555); }

  /* SVG overlay for arrows */
  .edges { position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 3; overflow: visible; }
  .edges path { fill: none; stroke: var(--accent); stroke-width: 1.5;
    filter: drop-shadow(0 0 4px var(--accent-glow)); }
  .edges .badge circle { fill: var(--accent); stroke: #1a1300; stroke-width: 1; }
  .edges .badge text { fill: #1a1300; font: 600 10px ui-sans-serif, system-ui;
    text-anchor: middle; dominant-baseline: central; }
  .edges .arrow-label { fill: var(--text); font: 500 11px ui-sans-serif, system-ui;
    text-anchor: middle; paint-order: stroke; stroke: var(--bg); stroke-width: 4; stroke-linejoin: round; }

  /* Step list below diagram */
  ol.steps { list-style: none; padding: 0; margin: 18px 0 0;
    border: 1px solid var(--line); border-radius: 12px; background: var(--panel); }
  ol.steps li { display: grid; grid-template-columns: 28px 1fr; gap: 12px;
    padding: 12px 16px; border-top: 1px solid var(--line); align-items: start; }
  ol.steps li:first-child { border-top: 0; }
  ol.steps .num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent);
    color: #1a1300; display: flex; align-items: center; justify-content: center;
    font: 600 11px ui-sans-serif, system-ui; margin-top: 2px; }
  ol.steps .step-title { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: var(--text); }
  ol.steps .step-title .label { color: var(--accent); font-weight: 500; margin-left: 8px; }
  ol.steps .step-desc { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .error { padding: 24px; border: 1px solid var(--line); border-radius: 12px;
    background: var(--panel); color: var(--muted); }
</style>
</head>
<body>
<div class="app">
  <header class="page">
    <h1 id="title">Loading…</h1>
    <p id="subtitle"></p>
    <nav class="toc" id="toc"></nav>
  </header>
  <main id="flows"></main>
</div>

<!--
  Flow data is loaded from the sibling `userflows.js`, which must define
  window.USERFLOWS. Keep the two files side-by-side. See schema.json in
  the userflow-capture skill for the data shape.
-->
<script src="./userflows.js"></script>

<script>
(function () {
  const SVG = "http://www.w3.org/2000/svg";
  const $ = (id) => document.getElementById(id);

  const data = (typeof window !== "undefined" && window.USERFLOWS) || null;
  if (!data) {
    $("title").textContent = "Could not load userflows.js";
    $("subtitle").textContent = "Make sure userflows.js sits next to this HTML file and defines window.USERFLOWS.";
    return;
  }
  if (!data.flows?.length) {
    $("title").textContent = "No flows defined";
    $("subtitle").textContent = "userflows.js loaded but has no flows.";
    return;
  }

  // Header
  $("title").textContent = data.project?.name ? `${data.project.name} — Userflows` : "Userflows";
  $("subtitle").textContent = data.project?.description ?? "";

  // Lookup tables
  const nodeById = new Map((data.nodes || []).map((n) => [n.id, n]));
  const laneById = new Map((data.lanes || []).map((l) => [l.id, l]));

  // TOC
  const tocEl = $("toc");
  data.flows.forEach((f, i) => {
    const a = document.createElement("a");
    a.href = `#flow-${f.id ?? i}`;
    a.textContent = f.title || `Flow ${i + 1}`;
    tocEl.appendChild(a);
  });

  // Render each flow as its own section
  const flowsEl = $("flows");
  data.flows.forEach((flow, i) => {
    const section = document.createElement("section");
    section.className = "flow";
    section.id = `flow-${flow.id ?? i}`;

    // Header
    const header = document.createElement("header");
    const h2 = document.createElement("h2");
    h2.textContent = flow.title || `Flow ${i + 1}`;
    header.appendChild(h2);
    if (flow.description) {
      const p = document.createElement("p");
      p.textContent = flow.description;
      header.appendChild(p);
    }
    section.appendChild(header);

    // Diagram
    const diagram = document.createElement("div");
    diagram.className = "diagram";

    const nodesContainer = document.createElement("div");
    nodesContainer.className = "nodes";
    diagram.appendChild(nodesContainer);

    // Collect unique nodes used in this flow, in encounter order
    const used = new Map(); // id → node element
    const order = [];
    (flow.steps || []).forEach((s) => {
      [s.from, s.to].forEach((id) => {
        if (id && !used.has(id)) {
          order.push(id);
          used.set(id, null);
        }
      });
    });

    // Render node cards
    order.forEach((id) => {
      const node = nodeById.get(id);
      const el = document.createElement("div");
      el.className = "node";
      el.dataset.id = id;
      const lane = node?.lane ? laneById.get(node.lane) : null;
      if (lane?.color) {
        el.style.setProperty("--cat", lane.color);
        el.dataset.cat = "1";
      }
      const title = node?.title ?? id;
      const sub = node?.subtitle;
      el.innerHTML = `<div class="title">${escapeHtml(title)}</div>${sub ? `<div class="sub">${escapeHtml(sub)}</div>` : ""}`;
      nodesContainer.appendChild(el);
      used.set(id, el);
    });

    // SVG overlay for arrows
    const svg = document.createElementNS(SVG, "svg");
    svg.setAttribute("class", "edges");
    svg.setAttribute("xmlns", SVG);
    diagram.appendChild(svg);

    section.appendChild(diagram);

    // Step list below diagram
    const ol = document.createElement("ol");
    ol.className = "steps";
    (flow.steps || []).forEach((s, idx) => {
      const li = document.createElement("li");
      const fromTitle = nodeById.get(s.from)?.title ?? s.from;
      const toTitle = nodeById.get(s.to)?.title ?? s.to;
      li.innerHTML = `
        <div class="num">${idx + 1}</div>
        <div>
          <div class="step-title">${escapeHtml(fromTitle)} → ${escapeHtml(toTitle)}${
            s.label ? `<span class="label">${escapeHtml(s.label)}</span>` : ""
          }</div>
          ${s.description ? `<div class="step-desc">${escapeHtml(s.description)}</div>` : ""}
        </div>`;
      ol.appendChild(li);
    });
    section.appendChild(ol);

    flowsEl.appendChild(section);

    // Stash refs for arrow rendering
    section._flow = { flow, nodesContainer, svg, used };
  });

  // Render arrows for every flow (after layout settles)
  function renderAllArrows() {
    document.querySelectorAll("section.flow").forEach((section) => {
      const ctx = section._flow;
      if (!ctx) return;
      drawArrows(ctx);
    });
  }

  function drawArrows({ flow, nodesContainer, svg, used }) {
    svg.innerHTML = "";
    const containerRect = svg.getBoundingClientRect();

    (flow.steps || []).forEach((s, i) => {
      const fromEl = used.get(s.from);
      const toEl = used.get(s.to);
      if (!fromEl || !toEl) return;

      const a = fromEl.getBoundingClientRect();
      const b = toEl.getBoundingClientRect();
      const ax = a.left - containerRect.left;
      const ay = a.top - containerRect.top;
      const bx = b.left - containerRect.left;
      const by = b.top - containerRect.top;

      const fromCenter = { x: ax + a.width / 2, y: ay + a.height / 2 };
      const toCenter   = { x: bx + b.width / 2, y: by + b.height / 2 };

      // Decide route: same row + forward → horizontal above; same row + backward → bow down
      // below (so the curve and label clear any intermediate nodes); different rows → vertical.
      const sameRow = Math.abs(fromCenter.y - toCenter.y) < Math.max(a.height, b.height) / 2;
      const goingBackward = sameRow && toCenter.x < fromCenter.x;
      let sx, sy, tx, ty, c1x, c1y, c2x, c2y, labelOffset;
      if (sameRow && !goingBackward) {
        // Forward in-row: connect inner sides, gentle horizontal bezier, label above
        sx = ax + a.width;
        sy = fromCenter.y;
        tx = bx;
        ty = toCenter.y;
        const cx = Math.max(40, (tx - sx) * 0.4);
        c1x = sx + cx; c1y = sy;
        c2x = tx - cx; c2y = ty;
        labelOffset = -18;
      } else if (goingBackward) {
        // Backward in-row: leave bottom of source, enter bottom of target, big downward bow,
        // label below the curve. Keeps the badge + label clear of intermediate nodes.
        sx = fromCenter.x;
        sy = ay + a.height;
        tx = toCenter.x;
        ty = by + b.height;
        const drop = Math.max(70, Math.abs(sx - tx) * 0.25);
        c1x = sx; c1y = sy + drop;
        c2x = tx; c2y = ty + drop;
        labelOffset = +20;
      } else {
        // Cross-row: vertical attach
        const goingDown = toCenter.y > fromCenter.y;
        sx = fromCenter.x;
        sy = goingDown ? ay + a.height : ay;
        tx = toCenter.x;
        ty = goingDown ? by : by + b.height;
        const cy = Math.max(40, Math.abs(ty - sy) * 0.4);
        c1x = sx; c1y = sy + Math.sign(ty - sy || 1) * cy;
        c2x = tx; c2y = ty - Math.sign(ty - sy || 1) * cy;
        labelOffset = -18;
      }

      const path = document.createElementNS(SVG, "path");
      path.setAttribute("d", `M ${sx} ${sy} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${tx} ${ty}`);
      svg.appendChild(path);

      // Midpoint (approximate via cubic bezier at t=0.5)
      const t = 0.5;
      const mx = bez(sx, c1x, c2x, tx, t);
      const my = bez(sy, c1y, c2y, ty, t);

      // Numbered badge
      const g = document.createElementNS(SVG, "g");
      g.setAttribute("class", "badge");
      g.setAttribute("transform", `translate(${mx}, ${my})`);
      const c = document.createElementNS(SVG, "circle");
      c.setAttribute("r", "11");
      const num = document.createElementNS(SVG, "text");
      num.textContent = String(i + 1);
      g.appendChild(c); g.appendChild(num);
      svg.appendChild(g);

      // Arrow label (offset above or below based on route)
      if (s.label) {
        const lab = document.createElementNS(SVG, "text");
        lab.setAttribute("class", "arrow-label");
        lab.setAttribute("x", mx);
        lab.setAttribute("y", my + labelOffset);
        lab.textContent = s.label;
        svg.appendChild(lab);
      }
    });
  }

  function bez(p0, p1, p2, p3, t) {
    const it = 1 - t;
    return it*it*it*p0 + 3*it*it*t*p1 + 3*it*t*t*p2 + t*t*t*p3;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  // Initial draw after layout
  requestAnimationFrame(renderAllArrows);

  // Redraw on resize (debounced)
  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderAllArrows, 80);
  });
})();
</script>
</body>
</html>
