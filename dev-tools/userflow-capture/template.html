<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Architecture & Flows</title>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111;
    --line: #1f1f1f;
    --line-2: #2a2a2a;
    --text: #e8e8e8;
    --muted: #6e6e6e;
    --dim: #3a3a3a;
    --accent: #f5b32b;
    --accent-glow: rgba(245,179,43,0.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font: 13px/1.45 ui-sans-serif, -apple-system, "SF Pro Text", Inter, system-ui, sans-serif; }
  code, .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }

  .app { display: grid; grid-template-columns: 1fr 340px; gap: 24px; padding: 28px; min-height: 100vh; }
  @media (max-width: 1100px) { .app { grid-template-columns: 1fr; } }

  /* Header */
  header h1 { font-size: 22px; margin: 0 0 6px; letter-spacing: -0.01em; }
  header p { margin: 0 0 14px; color: var(--muted); max-width: 80ch; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 18px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; }
  .legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

  /* Diagram */
  .diagram { position: relative; border: 1px solid var(--line); border-radius: 12px;
    background: linear-gradient(180deg, #0c0c0c, #080808); padding: 18px; min-height: 540px; }
  .lanes { position: relative; display: grid; grid-auto-flow: column; grid-auto-columns: minmax(150px, 1fr);
    gap: 14px; align-items: start; z-index: 2; }
  .lane h3 { font-size: 11px; letter-spacing: 0.12em; color: var(--muted); font-weight: 600;
    margin: 0 0 12px; text-transform: uppercase; }
  .node { background: #0e0e0e; border: 1px solid var(--dim); border-radius: 6px; padding: 10px 11px;
    margin-bottom: 12px; color: var(--muted); transition: border-color .15s, color .15s, background .15s, box-shadow .15s; }
  .node .title { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px;
    color: #8a8a8a; line-height: 1.3; }
  .node .sub { font-size: 11px; color: #4a4a4a; margin-top: 3px; }
  .node.active { border-color: #ffffff; background: #161616; color: var(--text); }
  .node.active .title { color: #ffffff; }
  .node.active .sub { color: #b0b0b0; }
  .node[data-cat]::before { content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 2px;
    margin-right: 6px; vertical-align: middle; background: var(--cat, #555); }

  /* SVG overlay for edges + step badges */
  .edges { position: absolute; inset: 18px; width: calc(100% - 36px); height: calc(100% - 36px);
    pointer-events: none; z-index: 3; overflow: visible; }
  .edges path { fill: none; stroke: var(--accent); stroke-width: 1.5; filter: drop-shadow(0 0 4px var(--accent-glow)); }
  .edges .badge circle { fill: var(--accent); stroke: #1a1300; stroke-width: 1; }
  .edges .badge text { fill: #1a1300; font: 600 10px ui-sans-serif, system-ui; text-anchor: middle; dominant-baseline: central; }

  /* Sidebar */
  aside { display: flex; flex-direction: column; gap: 18px; min-width: 0; }
  aside section { border: 1px solid var(--line); border-radius: 12px; background: var(--panel); padding: 14px; }
  aside h2 { font-size: 11px; letter-spacing: 0.14em; color: var(--muted); font-weight: 600;
    margin: 0 0 12px; text-transform: uppercase; }
  .flow { padding: 10px 12px; border: 1px solid transparent; border-radius: 8px; cursor: pointer;
    margin-bottom: 6px; transition: background .15s, border-color .15s; }
  .flow:hover { background: #161616; }
  .flow .flow-title { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: var(--text); }
  .flow .flow-desc { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .flow.active { border-color: var(--accent); background: rgba(245,179,43,0.06); }
  .flow.active .flow-title { color: var(--accent); }
  .clear { margin-top: 8px; background: transparent; border: 1px dashed var(--line-2); color: var(--muted);
    padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; width: 100%; }
  .clear:hover { color: var(--text); border-color: #444; }

  .steps .step { display: grid; grid-template-columns: 28px 1fr; gap: 10px; padding: 10px 0;
    border-top: 1px solid var(--line); }
  .steps .step:first-child { border-top: 0; }
  .step .num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #1a1300;
    display: flex; align-items: center; justify-content: center; font: 600 11px ui-sans-serif, system-ui; }
  .step .title { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: var(--text); }
  .step .body { font-size: 12px; color: var(--muted); margin-top: 3px; }

  .empty { color: var(--muted); font-size: 12px; padding: 8px 0; }
</style>
</head>
<body>
<div class="app">
  <main>
    <header>
      <h1 id="title">Loading…</h1>
      <p id="subtitle"></p>
      <div class="legend" id="legend"></div>
    </header>
    <div class="diagram">
      <div class="lanes" id="lanes"></div>
      <svg class="edges" id="edges" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </main>
  <aside>
    <section>
      <h2>Flows</h2>
      <div id="flows"></div>
      <button class="clear" id="clear">Clear selection</button>
    </section>
    <section>
      <h2>Steps</h2>
      <div class="steps" id="steps"><div class="empty">Pick a flow to see its steps.</div></div>
    </section>
  </aside>
</div>

<!--
  Flow data is loaded from the sibling `userflows.js`, which must define
  window.USERFLOWS. Keep the two files side-by-side. See schema.json in
  the userflow-capture skill for the data shape.
-->
<script src="./userflows.js"></script>

<script>
(function () {
  const SVG = "http://www.w3.org/2000/svg";
  const $ = (id) => document.getElementById(id);

  const data = (typeof window !== "undefined" && window.USERFLOWS) || null;
  if (!data) {
    $("title").textContent = "Could not load userflows.js";
    $("subtitle").textContent = "Make sure userflows.js sits next to this HTML file and defines window.USERFLOWS.";
    return;
  }
  if (!data.lanes?.length || !data.flows?.length) {
    $("title").textContent = "No flow data";
    $("subtitle").textContent = "userflows.js loaded but has no lanes/flows.";
    return;
  }

  // Header
  $("title").textContent = data.project?.name ? `${data.project.name} — Architecture & Flows` : "Architecture & Flows";
  $("subtitle").textContent = data.project?.description ?? "";

  // Legend
  const legend = $("legend");
  (data.lanes || []).forEach((l) => {
    if (!l.color) return;
    const el = document.createElement("span");
    el.innerHTML = `<i style="background:${l.color}"></i>${l.label || l.id}`;
    legend.appendChild(el);
  });

  // Lanes + nodes
  const lanesEl = $("lanes");
  const laneById = new Map();
  (data.lanes || []).forEach((lane) => {
    const col = document.createElement("div");
    col.className = "lane";
    col.dataset.lane = lane.id;
    col.innerHTML = `<h3>${lane.label || lane.id}</h3>`;
    lanesEl.appendChild(col);
    laneById.set(lane.id, { lane, col });
  });

  const nodeById = new Map();
  (data.nodes || []).forEach((n) => {
    const target = laneById.get(n.lane);
    if (!target) return;
    const el = document.createElement("div");
    el.className = "node";
    el.dataset.id = n.id;
    const color = target.lane.color || "#555";
    el.style.setProperty("--cat", color);
    el.dataset.cat = "1";
    el.innerHTML = `<div class="title">${n.title}</div>${n.subtitle ? `<div class="sub">${n.subtitle}</div>` : ""}`;
    target.col.appendChild(el);
    nodeById.set(n.id, el);
  });

  // Flows list
  const flowsEl = $("flows");
  (data.flows || []).forEach((f, i) => {
    const el = document.createElement("div");
    el.className = "flow";
    el.dataset.id = f.id || String(i);
    el.innerHTML = `<div class="flow-title">${f.title}</div>${f.description ? `<div class="flow-desc">${f.description}</div>` : ""}`;
    el.addEventListener("click", () => selectFlow(f.id || String(i)));
    flowsEl.appendChild(el);
  });

  $("clear").addEventListener("click", () => selectFlow(null));

  // Edge rendering
  function clearEdges() {
    $("edges").innerHTML = "";
    nodeById.forEach((el) => el.classList.remove("active"));
    document.querySelectorAll(".flow").forEach((el) => el.classList.remove("active"));
  }

  function rectInDiagram(el, container) {
    const a = el.getBoundingClientRect();
    const b = container.getBoundingClientRect();
    return { x: a.left - b.left, y: a.top - b.top, w: a.width, h: a.height };
  }

  function drawEdge(svg, from, to, n) {
    const container = svg;
    const a = rectInDiagram(from, container);
    const b = rectInDiagram(to, container);
    const fromRight = a.x + a.w >= b.x;       // b is to the left of a → loop back
    const sx = fromRight ? a.x : a.x + a.w;
    const sy = a.y + a.h / 2;
    const tx = fromRight ? b.x + b.w : b.x;
    const ty = b.y + b.h / 2;
    const dx = Math.abs(tx - sx);
    const cx = Math.max(40, dx * 0.5);
    const c1x = fromRight ? sx - cx : sx + cx;
    const c2x = fromRight ? tx + cx : tx - cx;
    const path = document.createElementNS(SVG, "path");
    path.setAttribute("d", `M ${sx} ${sy} C ${c1x} ${sy}, ${c2x} ${ty}, ${tx} ${ty}`);
    svg.appendChild(path);
    // step badge at midpoint of bezier (approx)
    const mx = (sx + tx) / 2;
    const my = (sy + ty) / 2;
    const g = document.createElementNS(SVG, "g");
    g.setAttribute("class", "badge");
    g.setAttribute("transform", `translate(${mx}, ${my})`);
    const c = document.createElementNS(SVG, "circle");
    c.setAttribute("r", "10");
    const t = document.createElementNS(SVG, "text");
    t.textContent = String(n);
    g.appendChild(c); g.appendChild(t);
    svg.appendChild(g);
  }

  function renderSteps(flow) {
    const stepsEl = $("steps");
    stepsEl.innerHTML = "";
    if (!flow) { stepsEl.innerHTML = `<div class="empty">Pick a flow to see its steps.</div>`; return; }
    flow.steps.forEach((s, i) => {
      const row = document.createElement("div");
      row.className = "step";
      const fromTitle = data.nodes.find((n) => n.id === s.from)?.title ?? s.from;
      const toTitle = data.nodes.find((n) => n.id === s.to)?.title ?? s.to;
      row.innerHTML = `
        <div class="num">${i + 1}</div>
        <div>
          <div class="title">${fromTitle} → ${toTitle}${s.label ? `<span style="color:var(--muted)"> · ${s.label}</span>` : ""}</div>
          ${s.description ? `<div class="body">${s.description}</div>` : ""}
        </div>`;
      stepsEl.appendChild(row);
    });
  }

  function selectFlow(id) {
    clearEdges();
    if (!id) { renderSteps(null); return; }
    const flow = data.flows.find((f) => (f.id ?? "") === id);
    if (!flow) return;
    document.querySelector(`.flow[data-id="${CSS.escape(id)}"]`)?.classList.add("active");
    // activate referenced nodes
    const touched = new Set();
    flow.steps.forEach((s) => { touched.add(s.from); touched.add(s.to); });
    touched.forEach((nid) => nodeById.get(nid)?.classList.add("active"));
    // draw edges (next paint, so layout is settled)
    requestAnimationFrame(() => {
      const svg = $("edges");
      flow.steps.forEach((s, i) => {
        const f = nodeById.get(s.from), t = nodeById.get(s.to);
        if (f && t) drawEdge(svg, f, t, i + 1);
      });
    });
    renderSteps(flow);
  }

  // Auto-select first flow if requested
  if (data.flows?.length && data.defaults?.autoSelectFirst) {
    selectFlow(data.flows[0].id);
  }

  // Redraw on resize
  let redrawTimer;
  window.addEventListener("resize", () => {
    clearTimeout(redrawTimer);
    redrawTimer = setTimeout(() => {
      const active = document.querySelector(".flow.active");
      if (active) selectFlow(active.dataset.id);
    }, 80);
  });
})();
</script>
</body>
</html>
