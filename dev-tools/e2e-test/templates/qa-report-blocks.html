<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://api.fontshare.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>QA Report — block library</title>
<style>
/* ============================================================
 * QA Evidence theme — monochrome (black / white / gray).
 * Color is reserved strictly for status: success, warning, error.
 * Self-contained; light + dark; each section is a 16:9 slide on desktop.
 * ============================================================ */
:root {
  color-scheme: light dark;
  --bg: oklch(1 0 0);
  --surface: oklch(0.985 0 0);
  --surface-soft: oklch(0.965 0 0);
  --surface-strong: oklch(0.86 0 0);
  --text: oklch(0.16 0 0);
  --text-muted: oklch(0.52 0 0);
  --border: oklch(0.9 0 0);
  --hairline: oklch(0 0 0 / 0.1);

  /* status only */
  --success: oklch(0.55 0.13 150);
  --success-soft: oklch(0.95 0.04 150);
  --warning: oklch(0.62 0.13 70);
  --warning-soft: oklch(0.95 0.05 75);
  --danger: oklch(0.55 0.22 27);
  --danger-soft: oklch(0.95 0.04 27);

  --shadow: 0 1px 2px oklch(0 0 0 / 0.05);
  --r-1: 8px;
  --r-2: 12px;
  --r-3: 16px;
  --radius: 16px;
  --canvas: oklch(0.97 0 0);
  --accent: oklch(0.55 0.22 295);
  --accent-glow: oklch(0.55 0.22 295 / 0.5);
  --font-display: "General Sans", ui-sans-serif, system-ui, sans-serif;
  --font-body: "Inter", ui-sans-serif, system-ui, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  /* responsive type scale (mobile -> desktop) */
  --fs-display: clamp(36px, 4.3vw, 62px);
  --fs-title: clamp(24px, 2.4vw, 34px);
  --fs-lead: clamp(16px, 1.7vw, 24px);
  --fs-body: clamp(16px, 1.25vw, 18px);
  --fs-small: clamp(14px, 1.1vw, 16px);
  /* spacing scale (8 / 16 / 24 / 40 / 64 / 96) */
  --space-1: 8px;
  --space-2: 16px;
  --space-3: 24px;
  --space-4: 40px;
  --space-5: 64px;
  --space-6: 96px;
  --page-pad: 128px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: oklch(0 0 0);
    --canvas: #1c1c1c;
    --surface: oklch(0.195 0 0);
    --surface-soft: oklch(0.235 0 0);
    --surface-strong: oklch(0.4 0 0);
    --text: oklch(0.96 0 0);
    --text-muted: oklch(0.66 0 0);
    --border: oklch(1 0 0 / 0.1);
    --hairline: oklch(1 0 0 / 0.1);
    --success: oklch(0.78 0.15 150);
    --success-soft: oklch(0.3 0.06 150 / 0.3);
    --warning: oklch(0.82 0.14 75);
    --warning-soft: oklch(0.3 0.07 75 / 0.3);
    --danger: oklch(0.7 0.19 27);
    --danger-soft: oklch(0.32 0.09 27 / 0.35);
    --shadow: 0 1px 2px oklch(0 0 0 / 0.4);
  }
}

@media (max-width: 820px) { :root { --page-pad: 80px; } }

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: var(--fs-body);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}
h1, h2, h3, h4 { font-family: var(--font-display); }
a { color: var(--text); text-underline-offset: 0.18em; text-decoration-color: var(--surface-strong); }
a:hover { text-decoration-color: var(--text); }

.wrap { max-width: 1120px; margin: 0 auto; padding: 0 40px; width: 100%; }

/* ---- Slide rhythm: each section is a ~16:9 slide on desktop.
   Height tracks the 1120px content width (1120 / 1.78 ≈ 630), capped so
   short slides don't float in a sea of empty space. ---- */
.slide {
  min-height: 640px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: var(--space-6) 0;
}
.slide:last-of-type { border-bottom: 0; }

/* ---- Header / cover: top-aligned header, not a centered slide ---- */
.cover { min-height: auto; justify-content: flex-start; padding: var(--page-pad) 0 var(--space-5); border-bottom: 0; }
.eyebrow {
  margin: 0 0 var(--space-2); color: var(--text-muted);
  font-size: 12px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
}
.cover h1 {
  margin: 0; font-size: var(--fs-display); font-weight: 500;
  line-height: 1.0; letter-spacing: -0.05em;
}
.summary {
  max-width: 62ch; margin: var(--space-3) 0 0; color: var(--text-muted);
  font-size: var(--fs-lead); font-weight: 400; line-height: 1.3; letter-spacing: -0.01em;
}
.summary-sub {
  max-width: 62ch; margin: var(--space-2) 0 0; color: var(--text-muted);
  font-size: var(--fs-body); font-weight: 400; line-height: 1.5; letter-spacing: -0.01em;
}

.pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 32px; }
.pill {
  display: inline-flex; align-items: center; gap: 8px; min-height: 32px;
  border: 1px solid var(--border); border-radius: 999px; padding: 4px 14px;
  background: var(--surface); color: var(--text-muted);
  font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums;
}
.pill code { background: transparent; padding: 0; font-size: 0.82rem; color: var(--text); font-family: var(--font-mono); }
.pill .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
.pill-verdict {
  border-color: color-mix(in srgb, var(--success) 45%, var(--border));
  background: var(--success-soft); color: var(--success); font-weight: 700;
}

/* ---- Split: 50/50 — title fills left half, content grid fills right half ---- */
.split {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 40px;
  align-items: center;
  width: 100%;
}
.kicker {
  display: block; margin: 0 0 14px; color: var(--text-muted);
  font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
}
.split-label h2 { margin: 0; font-size: var(--fs-title); font-weight: 500; line-height: 1.1; letter-spacing: -0.04em; max-width: 16ch; }
.split-label p { margin: 20px 0 0; color: var(--text-muted); font-size: 18px; font-weight: 400; line-height: 23.4px; letter-spacing: -0.01px; font-variation-settings: "opsz" 30, "wght" 500; max-width: 32ch; }
.split-body { min-width: 0; }

/* ---- Findings / gaps: equal-width card grid; column count = card count ---- */
.findings, .gaps { list-style: none; margin: 0; padding: 0; display: grid; gap: var(--space-2); }
.findings { grid-template-columns: repeat(2, minmax(0, 1fr)); } /* 4 cards → even 2×2 */
.gaps { grid-template-columns: repeat(3, minmax(0, 1fr)); }     /* 3 cards → even row of 3 */
.findings li, .gaps li {
  display: flex; flex-direction: column; align-items: flex-start; gap: var(--space-2);
  padding: var(--space-3); border: 1px solid var(--hairline); border-radius: var(--r-3);
  font-size: 18px; line-height: 1.5; text-wrap: pretty;
}
.findings .check, .gaps .mark {
  width: 44px; height: 44px; border-radius: var(--r-2);
  display: grid; place-items: center; font-size: 1.35rem; font-weight: 800;
}
.findings .ftext { width: 100%; display: flex; flex-direction: column; gap: var(--space-1); }
.findings .ftext h3 { margin: 0; font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em; }
.findings .ftext p { margin: 0; color: var(--text-muted); font-size: 0.98rem; line-height: 1.5; }
.findings .check { background: var(--success-soft); color: var(--success); }
.gaps .mark { background: var(--warning-soft); color: var(--warning); }
.findings code, .gaps code { background: var(--surface-soft); border: 1px solid var(--hairline); border-radius: var(--r-1); padding: 0.08em 0.4em; font-size: 0.82em; font-family: var(--font-mono); overflow-wrap: anywhere; word-break: break-word; }

/* ---- Stacked section: title above, full-width even grid below ---- */
.stack-head { margin-bottom: var(--space-4); }
.stack-head h2 { margin: 0; font-size: var(--fs-title); font-weight: 500; line-height: 1.1; letter-spacing: -0.04em; max-width: 26ch; }
.stack-head p { margin: 16px 0 0; color: var(--text-muted); font-size: 18px; font-weight: 400; line-height: 23.4px; letter-spacing: -0.01px; font-variation-settings: "opsz" 30, "wght" 500; max-width: 56ch; }
.flow-head h2 { margin: 0; font-size: var(--fs-title); font-weight: 500; line-height: 1.1; letter-spacing: -0.04em; }

/* feel-better: balanced headings, pretty body wrap */
.cover h1, .split-label h2, .stack-head h2, .flow-head h2 { text-wrap: balance; }
.summary, .split-label p, .stack-head p, .finding > span, .gaps li > span { text-wrap: pretty; }

/* ---- Metrics: full-width, even N-column layout ---- */
.metric-cols { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-2); }
.mcol { display: flex; flex-direction: column; padding: var(--space-3); border: 1px solid var(--hairline); border-radius: var(--r-3); }
.mcol .mval {
  font-size: clamp(2.8rem, 4.6vw, 4.2rem); font-weight: 600; line-height: 0.85;
  letter-spacing: -0.04em; color: var(--text);
  font-variant-numeric: tabular-nums lining-nums;
  font-feature-settings: "tnum" 1, "lnum" 1;
}
.mcol .mval.ok { color: var(--success); }
.mcol h3 { margin: 22px 0 6px; font-size: 1.1rem; font-weight: 600; }
.mcol p { margin: 0; color: var(--text-muted); font-size: 0.98rem; line-height: 1.45; overflow-wrap: anywhere; text-wrap: pretty; }

/* ---- Userflow: horizontal scroller (scales to ~20 screens) ---- */
.flow-head { margin-bottom: 28px; }
.flow-head .hint { margin: 8px 0 0; color: var(--text-muted); font-size: 0.85rem; }
.flow-scroll {
  overflow-x: auto; overflow-y: hidden;
  background: var(--canvas); border: 1px solid var(--hairline);
  border-radius: 4px; padding: 128px 26px 200px;
  scroll-snap-type: x proximity; scroll-padding-left: 26px; scrollbar-width: thin;
  scrollbar-color: var(--surface-strong) var(--canvas);
  -webkit-overflow-scrolling: touch;
}
.flow-scroll::-webkit-scrollbar { height: 10px; }
.flow-scroll::-webkit-scrollbar-track { background: var(--canvas); border-radius: 999px; }
.flow-scroll::-webkit-scrollbar-thumb { background: var(--surface-strong); border-radius: 999px; }
.flow-track { display: flex; align-items: flex-start; gap: 20px; list-style: none; margin: 0; padding: 4px 0; min-width: min-content; }
.step { position: relative; flex: 0 0 172px; width: 172px; scroll-snap-align: start; }
.step .shot { display: block; border: 1px solid var(--border); border-radius: var(--r-3); overflow: hidden; background: var(--bg); box-shadow: var(--shadow); }
.step .shot img { display: block; width: 100%; height: auto; }
.step .step-text { position: absolute; top: 100%; left: 0; right: 0; margin-top: var(--space-2); }
.step .step-text h3 { margin: 0 0 2px; font-size: 15px; font-weight: 600; }
.step .step-text p { margin: 0; color: var(--text-muted); font-size: 13px; line-height: 1.35; }
.flow-arrow { flex: 0 0 auto; align-self: center; display: grid; place-items: center; color: var(--text-muted); }
.flow-arrow svg { width: 22px; height: 22px; }

/* ---- Media ---- */
.media-wrap { max-width: 760px; }
.media {
  border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  background: #000; box-shadow: var(--shadow); width: 100%; aspect-ratio: 16 / 9;
}
.media video { display: block; width: 100%; height: 100%; object-fit: contain; background: #000; }
.link-line { display: flex; flex-wrap: wrap; gap: 20px; margin: 20px 0 0; font-size: 0.9rem; }

/* ---- Table ---- */
.tbl-wrap { border: 1px solid var(--hairline); border-radius: var(--radius); overflow: hidden; }
table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.92rem; }
th, td { text-align: left; padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--hairline); vertical-align: middle; }
tr:last-child td { border-bottom: 0; }
th { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
td code { font-family: var(--font-mono); font-size: 0.84rem; background: var(--surface-soft); border: 1px solid var(--hairline); border-radius: var(--r-1); padding: 0.15em 0.45em; }
.result { display: inline-flex; align-items: center; gap: 7px; font-weight: 700; color: var(--success); font-size: 0.82rem; letter-spacing: 0.04em; }
.result .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

/* ---- Artifact links: equal-width grid; column count = card count (3) ---- */
.artifacts { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--space-2); }
.artifacts a {
  display: flex; flex-direction: column; gap: 10px; align-items: flex-start;
  padding: 15px 18px; border: 1px solid var(--hairline); border-radius: var(--r-2);
  background: var(--surface); text-decoration: none; color: var(--text);
}
.artifacts a:hover { border-color: var(--surface-strong); }
.artifacts a:hover .a-name { text-decoration: underline; text-underline-offset: 0.18em; }
.artifacts .a-name { font-weight: 600; font-size: 18px; }
.artifacts .a-meta { color: var(--text-muted); font-family: var(--font-mono); font-size: 0.8rem; }

/* ---- Footer ---- */
.doc-footer { padding: 40px 0 var(--page-pad); color: var(--text-muted); font-size: 0.86rem; }
.doc-footer code { font-family: var(--font-mono); }
.doc-footer .sep { margin: 0 9px; opacity: 0.5; }

/* ---- Responsive: drop the slide constraint on mobile ---- */
@media (max-width: 820px) {
  .wrap { padding: 0 22px; }
  .slide, .cover { min-height: 0; padding: 56px 0; }
  .split { grid-template-columns: 1fr; gap: 26px; }
  .split-label p { max-width: none; }
  .metric-cols { grid-template-columns: repeat(2, 1fr) !important; gap: 24px; }
  .findings, .gaps, .artifacts { grid-template-columns: 1fr !important; }
}
</style>
</head>
<body>
<style>
/* ---- generic data-driven template additions ---- */
.pill-verdict.fail { border-color: color-mix(in srgb, var(--danger) 45%, var(--border)); background: var(--danger-soft); color: var(--danger); }
.pill-verdict.partial { border-color: color-mix(in srgb, var(--warning) 45%, var(--border)); background: var(--warning-soft); color: var(--warning); }
.result.fail { color: var(--danger); }
.result.flaky { color: var(--warning); }
.result.skip { color: var(--text-muted); }
.statstrip { display: flex; flex-wrap: wrap; gap: 24px 44px; margin-bottom: 30px; }
.statstrip .s { display: flex; flex-direction: column; gap: 3px; }
.statstrip .s b { font-size: 30px; font-weight: 600; letter-spacing: -0.03em; line-height: 1; font-variant-numeric: tabular-nums lining-nums; }
.statstrip .s span { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
.statstrip .s.pass b { color: var(--success); }
.statstrip .s.fail b { color: var(--danger); }
.statstrip .s.flaky b { color: var(--warning); }
.atts a { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); margin-left: 8px; }
.atts a:hover { color: var(--text); }

/* ---- meta line (replaces top pill badges) ---- */
.meta { display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px var(--space-2); margin-top: var(--space-4); color: var(--text-muted); font-size: 15px; font-variant-numeric: tabular-nums; }
.meta .v { font-weight: 700; letter-spacing: 0.03em; color: var(--success); }
.meta .v.fail { color: var(--danger); }
.meta .v.partial { color: var(--warning); }
.meta .sep { color: var(--surface-strong); }
.meta .mono { font-family: var(--font-mono); color: var(--text); }

/* ---- large rounded CTAs ---- */
.cta-row { display: flex; flex-wrap: wrap; gap: var(--space-2); margin-top: var(--space-4); }
.cta { display: inline-flex; align-items: center; gap: 7px; padding: 11px 20px; border-radius: 100px; border: 1px solid transparent; background: var(--surface-soft); color: var(--text-muted); font-size: 15px; font-weight: 560; letter-spacing: -0.02em; line-height: 1; text-decoration: none; transition: background .15s ease, color .15s ease, transform .1s ease; }
.cta:hover { background: var(--surface); color: var(--text); }
.cta:active { transform: scale(0.97); }
.cta svg { width: 15px; height: 15px; }
.cta.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
.cta.primary:hover { opacity: 0.88; }

/* ---- simple scaling lists (artifacts, gaps) ---- */
.maestro-list { display: flex; flex-direction: column; gap: var(--space-2); }
.maestro-list a { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-3); border: 1px solid var(--hairline); border-radius: var(--r-3); text-decoration: none; color: var(--text); }
.maestro-list a:hover { border-color: var(--surface-strong); }
.maestro-list .ln { font-size: 18px; font-weight: 600; }
.maestro-list .lm { color: var(--text-muted); font-family: var(--font-mono); font-size: 0.82rem; white-space: nowrap; }
.maestro-list .chev { margin-left: auto; color: var(--text-muted); display: inline-flex; }
.maestro-list .chev svg { width: 20px; height: 20px; }
.gaps-list { list-style: none; margin: 0; padding: 0; }
.gaps-list li { display: grid; grid-template-columns: 20px 1fr; gap: 16px; align-items: start; padding: var(--space-2) 2px; font-size: 18px; line-height: 1.5; border-bottom: 1px solid var(--hairline); text-wrap: pretty; }
.gaps-list li:first-child { border-top: 1px solid var(--hairline); }
.gaps-list .gm { margin-top: 3px; color: var(--warning); display: inline-flex; }
.gaps-list .gm svg { width: 18px; height: 18px; }

/* ---- Background / context: numbered brief of what was reported ---- */
.ctx-list { counter-reset: ctx; list-style: none; margin: 0; padding: 0; display: grid; gap: var(--space-4); max-width: 74ch; }
.ctx-list li { counter-increment: ctx; display: grid; grid-template-columns: 38px 1fr; gap: var(--space-2); align-items: start; }
.ctx-list li::before { content: counter(ctx); display: grid; place-items: center; width: 38px; height: 38px; border-radius: var(--r-2); background: var(--surface-soft); border: 1px solid var(--hairline); font-family: var(--font-mono); font-weight: 700; font-size: 1rem; color: var(--text-muted); }
.ctx-list h3 { margin: 0 0 var(--space-1); font-size: 1.1rem; font-weight: 600; }
.ctx-list p { margin: 0; color: var(--text-muted); font-size: 1rem; line-height: 1.55; text-wrap: pretty; }
.ctx-body { max-width: 74ch; color: var(--text-muted); font-size: 1.05rem; line-height: 1.6; text-wrap: pretty; }
.ctx-body + .ctx-body { margin-top: 14px; }

/* literal UI strings: brighter than the muted body, no code box */
.lit { color: var(--text); }


/* ---- assertions (the real Maestro assert* checks) ---- */
.assert-list { list-style: none; margin: 0; padding: 0; }
.assert-list li { display: grid; grid-template-columns: 22px 1fr; gap: 14px; align-items: start; padding: var(--space-2) 2px; border-bottom: 1px solid var(--hairline); font-family: var(--font-mono); font-size: 0.92rem; line-height: 1.5; }
.assert-list li:first-child { border-top: 1px solid var(--hairline); }
.assert-list .ai { margin-top: 1px; display: inline-flex; }
.assert-list .ai svg { width: 16px; height: 16px; }
.assert-list .ai.ok { color: var(--success); }
.assert-list .ai.no { color: var(--danger); }

/* ---- before / after comparison ---- */
.ba { display: flex; flex-direction: column; gap: 30px; }
.ba-pair { display: flex; flex-wrap: wrap; gap: 24px; }
.ba-card { flex: 0 0 290px; max-width: 290px; display: flex; flex-direction: column; gap: 12px; }
.ba-label { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
.ba-card.after .ba-label { color: var(--success); }
.ba-frame { display: block; border: 1px solid var(--border); border-radius: var(--r-3); overflow: hidden; background: var(--bg); }
.ba-frame img { display: block; width: 100%; height: auto; }
.ba-cap { color: var(--text-muted); font-size: 0.9rem; }

/* ---- results card: even-column stat band joined to the table ---- */
.results { border: 1px solid var(--hairline); border-radius: var(--radius); overflow: hidden; }
.results .stat-band { display: grid; grid-template-columns: repeat(var(--n, 4), minmax(0, 1fr)); border-bottom: 1px solid var(--hairline); }
.results .stat-band .s { padding: var(--space-2) var(--space-3); display: flex; flex-direction: column; border-right: 1px solid var(--hairline); }
.results .stat-band .s:last-child { border-right: 0; }
.results .stat-band .s b { font-size: 28px; font-weight: 600; letter-spacing: -0.03em; line-height: 1; font-variant-numeric: tabular-nums lining-nums; }
.results .stat-band .s span { margin-top: var(--space-1); font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
.results .stat-band .s.pass b { color: var(--success); }
.results .stat-band .s.fail b { color: var(--danger); }
.results .stat-band .s.flaky b { color: var(--warning); }
.results table { border: 0; }
.results th, .results td { padding-left: 24px; padding-right: 24px; }
@media (max-width: 820px) {
  .results .stat-band { grid-template-columns: repeat(2, 1fr); }
  .results .stat-band .s { border-right: 0; border-bottom: 1px solid var(--hairline); }
}

/* ---- Ledger: one mega-table in a bordered card; each group gets a title row + spacing ---- */
.ledger-card { border: 1px solid var(--hairline); border-radius: var(--r-3); overflow: hidden; }
.ledger { width: 100%; }
.ledger td { padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--hairline); vertical-align: top; text-align: left; }
.ledger .ledger-val { text-align: right; white-space: nowrap; padding-left: var(--space-3); color: var(--text-muted); }
.ledger .lk-row { display: flex; align-items: center; gap: 12px; }
.ledger .lk-badge { background: var(--surface-soft); border: 1px solid var(--hairline); border-radius: var(--r-1); padding: 3px 9px; font-family: var(--font-mono); font-size: 0.76rem; letter-spacing: 0.02em; color: var(--text); text-decoration: none; line-height: 1.5; }
.ledger .lk-badge:hover { background: var(--surface); }
.ledger .lk-ic { margin-left: auto; display: inline-flex; color: var(--text-muted); }
.ledger .lk-ic:hover { color: var(--text); }
.ledger .lk-ic svg { width: 16px; height: 16px; }
.ledger .ledger-group td { padding: var(--space-5) var(--space-3) var(--space-2); }
.ledger .ledger-group:first-child td { padding-top: var(--space-3); }
.ledger .ledger-group h3 { margin: 0; font-size: var(--fs-body); font-weight: 600; letter-spacing: -0.01em; }
.ledger .ledger-group p { margin: var(--space-1) 0 0; color: var(--text-muted); font-size: var(--fs-small); }
/* ---- Specs: grouped label -> long-description, wraps cleanly (file paths, prose). For key/value where the value is too long for the ledger. ---- */
.specs-card { border: 1px solid var(--hairline); border-radius: var(--r-3); overflow: hidden; }
.specs-card .spec-group > h3 { margin: 0; padding: var(--space-5) var(--space-3) var(--space-2); font-size: var(--fs-body); font-weight: 600; letter-spacing: -0.01em; }
.specs-card .spec-group:first-child > h3 { padding-top: var(--space-3); }
.spec-row { display: grid; grid-template-columns: 170px minmax(0, 1fr); gap: var(--space-3); padding: var(--space-2) var(--space-3); border-top: 1px solid var(--hairline); }
.spec-key { color: var(--text-muted); font-weight: 500; }
.spec-val { overflow-wrap: anywhere; text-wrap: pretty; }
@media (max-width: 600px) {
  .spec-row { grid-template-columns: 1fr; gap: 3px; }
  .spec-key { font-size: var(--fs-small); }

  /* ledger value rows stack: label/command on top, status below */
  .ledger td code { overflow-wrap: anywhere; word-break: break-word; }
  .ledger .ledger-key { display: block; border-bottom: 0; padding-bottom: var(--space-1); }
  .ledger .ledger-val { display: block; text-align: left; white-space: normal; padding-left: var(--space-3); padding-top: 0; }

  /* multi-column data tables -> stacked label/value rows */
  .rtable thead { display: none; }
  .rtable, .rtable tbody { display: block; }
  .rtable tr { display: block; padding: var(--space-2) 0; border-bottom: 1px solid var(--hairline); }
  .rtable tr:last-child { border-bottom: 0; }
  .rtable td { display: block; border: 0; padding: 2px var(--space-3); text-align: left; overflow-wrap: anywhere; }
  .rtable td + td { padding-top: var(--space-1); }
  .rtable td::before { content: attr(data-label); display: block; margin-bottom: 1px; font-size: 12px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-muted); }
  .rtable td:empty { display: none; }
}

/* ---- EXPERIMENT: docs layout — 800px content + 220px right nav, 64px gap ---- */
.docs { display: grid; grid-template-columns: minmax(0, 800px) 220px; gap: 64px; justify-content: center; padding: var(--page-pad) 40px 0; }
.docs-main { min-width: 0; }
.docs-main .wrap { max-width: none; padding: 0; margin: 0; width: 100%; }
.docs-main .slide { min-height: 0; padding: var(--space-4) 0; }
.docs-main .cover { padding: 0 0 var(--space-5); }
.docs-main .doc-footer { padding: var(--space-4) 0 var(--page-pad); }
.docs-main .cover h1 { font-size: 44px; line-height: 1.05; letter-spacing: -1.6px; }
.docs-main .cover .summary { font-size: var(--fs-lead); line-height: 1.3; margin-top: 20px; }
.docs-nav { position: sticky; top: 36px; align-self: start; }
.docs-nav .nav-title { margin: 0 0 16px; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
.docs-nav a { display: block; padding: 7px 0 7px 16px; border-left: 2px solid var(--hairline); color: var(--text-muted); font-size: 0.92rem; line-height: 1.35; text-decoration: none; }
.docs-nav a:hover { color: var(--text); border-left-color: var(--surface-strong); }
.docs-nav a.active { color: var(--text); border-left-color: var(--text); }
@media (max-width: 980px) {
  .docs { grid-template-columns: 1fr; gap: 0; padding: 24px 22px 40px; }
  .docs-nav { display: none; }
}

/* ---- Phone (<=600px): true single column; userflow scroller goes full-bleed edge-to-edge ---- */
@media (max-width: 600px) {
  .metric-cols { grid-template-columns: 1fr !important; gap: 20px; }
  .ba-pair { flex-direction: column; gap: 18px; }
  .ba-card { flex: 1 1 auto; width: 100%; max-width: none; }

  .flow-scroll {
    margin-left: calc(50% - 50vw); margin-right: calc(50% - 50vw);
    border-radius: 0; border-left: 0; border-right: 0;
    padding: 104px 20px 176px;
    scroll-snap-type: x mandatory; scroll-padding-left: 20px;
  }
  .flow-track { gap: 16px; }
  .step { flex-basis: 64vw; width: 64vw; }
}

/* ---- Charts: deliberately small — a few values, not a dashboard ---- */
.charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: var(--space-2); }
.chart { margin: 0; padding: var(--space-3); border: 1px solid var(--hairline); border-radius: var(--r-3); }
.chart figcaption { font-size: var(--fs-small); font-weight: 600; color: var(--text); margin-bottom: var(--space-2); }
.pie { display: flex; align-items: center; gap: var(--space-3); }
.pie-svg { width: 92px; height: 92px; flex: 0 0 auto; }
.chart-legend { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 7px; min-width: 0; }
.chart-legend li { display: flex; align-items: center; gap: 8px; font-size: var(--fs-small); color: var(--text); }
.chart-legend .sw { width: 10px; height: 10px; border-radius: 3px; flex: 0 0 auto; }

.bar-fill { display: block; height: 100%; border-radius: 999px; }

/* ---- Properties: aligned label / value rows (compact key-value) ---- */
.props { display: grid; grid-template-columns: max-content max-content; gap: 13px 56px; align-items: center; font-size: 15px; }
.props dt { display: flex; align-items: center; gap: 10px; margin: 0; color: var(--text-muted); }

/* ---- Collapsible: expandable rows, divided like the checklist ---- */

.collapse-list > li:last-child { border-bottom: 0; }

.collapse-list .cl-title { margin-right: auto; font-size: 18px; line-height: 1.4; }

.nm-field { display: flex; flex-direction: column; gap: 7px; }
.nm-k { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }

.cl-meta { margin: 0 0 var(--space-2); font-size: 0.82rem; color: var(--text-muted); }
.cl-steps { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }

<div id="app"></div>

<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);

  // Fixed canonical order. Blocks render only if present in DATA.blocks.
  const ORDER = ["properties", "context", "verdict", "metrics", "charts", "flow-results", "assertions", "collapsible", "flowchart", "userflows", "before-after", "recording", "specs", "ledger", "unit-tests", "playwright", "maestro", "backend", "gaps"];
  const TITLES = {
    context: "Background", verdict: "Verdict", metrics: "Run summary", charts: "Charts", "flow-results": "Flow results", assertions: "Assertions", collapsible: "Details", flowchart: "Flow chart", ledger: "Details", specs: "Breakdown", properties: "Properties",
    userflows: "Userflows", "before-after": "Before / after", recording: "Recording",
    "unit-tests": "Unit tests", playwright: "Playwright", maestro: "Maestro", backend: "Backend", gaps: "Known gaps"
  };

  const textOf = it => (typeof it === "string" ? it : it.text);
  // Even grid: prefer 3 when divisible by 3, else 2 when even, else up to 3.
  const evenCols = n => (n <= 1 ? 1 : n % 3 === 0 ? 3 : n % 2 === 0 ? 2 : Math.min(n, 3));
  // au() tags authored-by-us text. Passthrough by default; wrap in
  // `<span class="au">` + re-enable the .au CSS rule to re-run the violet audit.
  const au = s => s;
  const slug = s => (s || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
  const head = (type, lead) => `<div class="stack-head"><h2>${au(TITLES[type])}</h2>${lead ? `<p>${au(lead)}</p>` : ""}</div>`;
  // Simple rule for multi-column tables: any table with a <thead> auto-stacks on
  // mobile. This stamps each cell with its column header so CSS can show it as a label.
  const labelizeTables = root => root.querySelectorAll("table").forEach(t => {
    const heads = [...t.querySelectorAll("thead th")].map(th => th.textContent.trim());
    if (!heads.length) return;
    t.classList.add("rtable");
    t.querySelectorAll("tbody tr").forEach(tr => [...tr.children].forEach((td, i) => {
      if (heads[i]) td.setAttribute("data-label", heads[i]);
    }));
  });
  // ---- Simple charts: a few values only; donut pie + horizontal bars, inline SVG/CSS ----
  const chartColor = (i, c) => {
    const map = { pass: "var(--success)", success: "var(--success)", fail: "var(--danger)", danger: "var(--danger)", warn: "var(--warning)", warning: "var(--warning)", skip: "var(--text-muted)", muted: "var(--text-muted)" };
    if (c && map[c]) return map[c];
    const seq = ["var(--text)", "var(--surface-strong)", "var(--text-muted)", "var(--success)", "var(--warning)", "var(--danger)"];
    return seq[i % seq.length];
  };
  const pieChart = data => {
    const items = (data || []).slice(0, 6);
    const total = items.reduce((s, d) => s + (+d.value || 0), 0) || 1;
    const C = 2 * Math.PI * 40;
    let acc = 0;
    const segs = items.map((d, i) => {
      const f = (+d.value || 0) / total;
      const seg = `<circle cx="50" cy="50" r="40" fill="none" stroke="${chartColor(i, d.color)}" stroke-width="16" stroke-dasharray="${(f * C).toFixed(2)} ${(C - f * C).toFixed(2)}" stroke-dashoffset="${(-acc * C).toFixed(2)}" transform="rotate(-90 50 50)"></circle>`;
      acc += f; return seg;
    }).join("");
    const legend = items.map((d, i) => `<li><span class="sw" style="background:${chartColor(i, d.color)}"></span>${au(d.label)}<span class="lv">${Math.round((+d.value || 0) / total * 100)}%</span></li>`).join("");
    return `<div class="pie"><svg viewBox="0 0 100 100" class="pie-svg" role="img" aria-label="pie chart">${segs}</svg><ul class="chart-legend">${legend}</ul></div>`;
  };
  const barChart = data => {
    const items = (data || []).slice(0, 6);
    const max = Math.max(1, ...items.map(d => +d.value || 0));
    return `<ul class="bars">${items.map((d, i) => `<li><span class="bar-label">${au(d.label)}</span><span class="bar-track"><span class="bar-fill" style="width:${((+d.value || 0) / max * 100).toFixed(1)}%;background:${d.color ? chartColor(i, d.color) : "var(--text)"}"></span></span><span class="bar-val">${au(String(d.value))}</span></li>`).join("")}</ul>`;
  };

  const ICON = {
    warn: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.7 18-8-14a2 2 0 0 0-3.4 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>',
    play: '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/></svg>',
    flow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><g transform="rotate(90 12 12)"><path d="M16 3h5v5"/><path d="M8 3H3v5"/><path d="M12 22v-8.3a4 4 0 0 0-1.172-2.872L3 3"/><path d="m15 9 6-6"/></g></svg>',
    check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
    x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>',
    arrow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>',
    ext: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h6"/><path d="m21 3-9 9"/><path d="M15 3h6v6"/></svg>',
    sdot: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.4" fill="currentColor" stroke="none"/></svg>',
    device: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="13" height="20" x="5.5" y="2" rx="2.5"/><path d="M11 18h2"/></svg>',
    commit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.5"/><path d="M3 12h5.5"/><path d="M15.5 12H21"/></svg>',
    clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3 2"/></svg>',
    chev: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>'
  };

  function badge(status) {
    const s = (status || "pass").toLowerCase();
    const label = {pass: "PASS", passed: "PASS", expected: "PASS", fail: "FAIL", failed: "FAIL", unexpected: "FAIL", timedout: "FAIL", interrupted: "FAIL", flaky: "FLAKY", skip: "SKIPPED", skipped: "SKIPPED"}[s] || s.toUpperCase();
    const cls = {pass: "", passed: "", expected: "", fail: " fail", failed: " fail", unexpected: " fail", timedout: " fail", interrupted: " fail", flaky: " flaky", skip: " skip", skipped: " skip"}[s] || "";
    return `<span class="result${cls}"><span class="dot"></span>${label}</span>`;
  }

  // Even-column stat band joined to a table inside one bordered card.
  function resultsCard(stats, tableInner) {
    const cell = (label, val, cls = "") => (val == null ? null : `<div class="s${cls}"><b>${val}</b><span>${au(label)}</span></div>`);
    const passed = stats && (stats.passed != null ? stats.passed : stats.expected);
    const failed = stats && (stats.failed != null ? stats.failed : stats.unexpected);
    const cells = stats ? [
      cell("passed", passed, " pass"),
      cell("failed", failed, failed ? " fail" : ""),
      cell("flaky", stats.flaky, stats.flaky ? " flaky" : ""),
      cell("skipped", stats.skipped),
      cell("duration", stats.duration)
    ].filter(Boolean) : [];
    const band = cells.length ? `<div class="stat-band" style="--n:${cells.length}">${cells.join("")}</div>` : "";
    return `<div class="results">${band}${tableInner}</div>`;
  }

  function thRow(labels) {
    return `<thead><tr>${labels.map(l => `<th>${au(l)}</th>`).join("")}</tr></thead>`;
  }

  function checksTable(checks) {
    return `<div class="tbl-wrap"><table><thead><tr><th>${au("Check")}</th><th>${au("Result")}</th></tr></thead><tbody>${
      checks.map(c => `<tr><td><code>${c.cmd}</code></td><td>${badge(c.status)}</td></tr>`).join("")
    }</tbody></table></div>`;
  }

  const R = {
    context: b => `${head("context", b.lead)}${b.items ? `<ol class="ctx-list">${
      b.items.map(it => `<li><div class="ctx-text"><h3>${au(it.title)}</h3><p>${au(it.desc)}</p></div></li>`).join("")}</ol>` : ""}${
      (b.body || []).map(p => `<p class="ctx-body">${au(p)}</p>`).join("")}`,

    verdict: b => `${head("verdict", b.lead)}<ul class="findings" style="grid-template-columns:repeat(${evenCols(b.items.length)},minmax(0,1fr))">${
      b.items.map(it => { const o = typeof it === "string" ? {desc: it} : it;
        return `<li><span class="check" aria-hidden="true">✓</span><div class="ftext">${o.title ? `<h3>${au(o.title)}</h3>` : ""}${o.desc ? `<p>${au(o.desc)}</p>` : ""}</div></li>`; }).join("")}</ul>`,

    gaps: b => `${head("gaps", b.lead)}<ul class="gaps-list">${
      b.items.map(it => `<li><span class="gm">${ICON.warn}</span><span>${au(textOf(it))}</span></li>`).join("")}</ul>`,

    metrics: b => `${head("metrics", b.lead)}<div class="metric-cols" style="grid-template-columns:repeat(${Math.min(b.items.length, 2)},minmax(0,1fr))">${
      b.items.map(m => `<div class="mcol"><span class="mval${m.ok ? " ok" : ""}">${m.value}</span><h3>${au(m.label)}</h3>${m.note ? `<p>${au(m.note)}</p>` : ""}</div>`).join("")}</div>`,

    userflows: b => `<div class="flow-head"><h2>${au(TITLES.userflows)}</h2>${b.lead ? `<p class="hint">${au(b.lead)}</p>` : ""}</div>` +
      `<div class="flow-wrap">${b.label ? `<span class="flow-label">${au(b.label)}</span>` : ""}<div class="flow-scroll${b.variant === "desktop" ? " flow-desktop" : ""}" tabindex="0" aria-label="Userflow"><ol class="flow-track">${
        b.steps.map(s => `<li class="step"><a class="shot" href="${s.image}" target="_blank" rel="noopener"><img loading="lazy" alt="${s.name || ""}" src="${s.image}"></a><div class="step-text"><h3>${au(s.name || "")}</h3>${s.note ? `<p>${au(s.note)}</p>` : ""}</div></li>`).join(`<li class="flow-arrow" aria-hidden="true">${ICON.arrow}</li>`)
      }</ol></div></div>`,

    recording: b => `${head("recording", b.lead)}<div class="media"><video controls preload="metadata"${b.poster ? ` poster="${b.poster}"` : ""}><source src="${b.video}" type="video/mp4"></video></div>${
      b.links ? `<div class="link-line">${b.links.map(l => `<a href="${l.url}">${au(l.label)} ↗</a>`).join("")}</div>` : ""
    }`,

    ledger: b => `<div class="ledger-card"><table class="ledger"><tbody>${
      (b.groups || []).map(g => `<tr class="ledger-group" id="lg-${slug(g.title)}"><td colspan="2"><h3>${g.title}</h3>${g.lead ? `<p>${g.lead}</p>` : ""}</td></tr>${
        g.rows.map(r => r.href
          ? `<tr><td colspan="2"><span class="lk-row"><span class="lk-label">${r.label}</span><a class="lk-badge" href="${r.href}" target="_blank" rel="noopener">${r.value}</a><a class="lk-ic" href="${r.href}" target="_blank" rel="noopener" aria-label="Open ${r.value}">${ICON.ext}</a></span></td></tr>`
          : r.value
          ? `<tr><td class="ledger-key">${r.label}</td><td class="ledger-val">${r.value}</td></tr>`
          : `<tr><td colspan="2">${r.label}</td></tr>`).join("")
      }`).join("")}</tbody></table></div>`,

    charts: b => `${head("charts", b.lead)}<div class="charts">${
      (b.items || []).map(c => `<figure class="chart">${c.title ? `<figcaption>${au(c.title)}</figcaption>` : ""}${(c.kind === "bar" ? barChart : pieChart)(c.data)}</figure>`).join("")}</div>`,

    properties: b => `${head("properties", b.lead)}<dl class="props">${
      (b.items || []).map(p => `<dt>${p.icon && ICON[p.icon] ? `<span class="pi">${ICON[p.icon]}</span>` : ""}<span>${au(p.label)}</span></dt><dd${p.tone ? ` class="tone-${p.tone}"` : ""}>${au(String(p.value))}</dd>`).join("")}</dl>`,

    collapsible: b => `${head("collapsible", b.lead)}<ul class="collapse-list">${
      (b.items || []).map(it => `<li><details><summary><span class="cl-title">${au(it.title)}</span>${it.status ? badge(it.status) : ""}<span class="cl-chev">${ICON.chev}</span></summary><div class="cl-body">${au(it.body || "")}</div></details></li>`).join("")}</ul>`,

    flowchart: b => `${head("flowchart", b.lead)}<div class="flow-scroll fc" tabindex="0" aria-label="Flow chart"><ol class="flow-track">${
      (b.steps || []).map((s, i) => `<li class="fc-node"><span class="fc-num">${au(s.step || ("Step " + (i + 1)))}</span><h3 class="fc-title">${au(s.title)}</h3>${s.desc ? `<p class="fc-desc">${au(s.desc)}</p>` : ""}</li>`).join(`<li class="fc-edge" aria-hidden="true"><span class="fc-line"></span></li>`)}</ol></div>`,

    specs: b => `<div class="specs-card">${
      (b.groups || [{ rows: b.rows || [] }]).map(g => `<div class="spec-group"${g.title ? ` id="sg-${slug(g.title)}"` : ""}>${g.title ? `<h3>${au(g.title)}</h3>` : ""}${
        (g.rows || []).map(r => `<div class="spec-row"><span class="spec-key">${au(r.label)}</span><span class="spec-val">${au(r.desc)}</span></div>`).join("")
      }</div>`).join("")}</div>`,

    "unit-tests": b => `${head("unit-tests", b.lead)}${checksTable(b.checks)}`,
    backend: b => `${head("backend", b.lead)}${checksTable(b.checks)}`,

    "flow-results": b => `${head("flow-results", b.lead)}${resultsCard(b.stats, `<table>${thRow(["Flow", "Device", "Duration", "Result"])}<tbody>${
      b.flows.map(f => `<tr><td>${f.name}</td><td>${f.device || ""}</td><td>${f.duration || ""}</td><td>${badge(f.status)}</td></tr>`).join("")}</tbody></table>`)}`,

    assertions: b => `${head("assertions", b.lead)}<ul class="assert-list">${
      b.items.map(it => { const o = typeof it === "string" ? {text: it} : it; const ok = (o.status || "pass").toLowerCase() !== "fail";
        return `<li><span class="ai ${ok ? "ok" : "no"}">${ok ? ICON.check : ICON.x}</span><span>${o.text}</span></li>`; }).join("")}</ul>`,

    "before-after": b => `${head("before-after", b.lead)}<div class="ba">${
      (b.pairs || []).map(p => `<div class="ba-pair"><div class="ba-card before"><span class="ba-label">${au(p.beforeLabel || "Before")}</span><a class="ba-frame" href="${p.before.image}" target="_blank" rel="noopener"><img loading="lazy" alt="before" src="${p.before.image}"></a>${p.before.caption ? `<span class="ba-cap">${au(p.before.caption)}</span>` : ""}</div><div class="ba-card after"><span class="ba-label">${au(p.afterLabel || "After")}</span><a class="ba-frame" href="${p.after.image}" target="_blank" rel="noopener"><img loading="lazy" alt="after" src="${p.after.image}"></a>${p.after.caption ? `<span class="ba-cap">${au(p.after.caption)}</span>` : ""}</div></div>`).join("")}</div>`,

    maestro: b => `${head("maestro", b.lead)}<div class="maestro-list">${
      b.artifacts.map(a => `<a href="${a.url}"><span class="ln">${au(a.name)}</span>${a.meta ? `<span class="lm">${a.meta}</span>` : ""}<span class="chev">${ICON.chev}</span></a>`).join("")}</div>`,

    playwright: b => `${head("playwright", b.lead)}${resultsCard(b.stats, `<table>${thRow(["Test", "Project", "Duration", "Result"])}<tbody>${
      b.results.map(r => `<tr><td>${r.name}${r.attachments ? `<span class="atts">${r.attachments.map(a => `<a href="${a.url}">${a.type}</a>`).join("")}</span>` : ""}</td><td>${r.project || ""}</td><td>${r.duration || ""}</td><td>${badge(r.status)}</td></tr>`).join("")
    }</tbody></table>`)}`
  };

  function render() {
    const r = DATA.report || {};
    // "QA report" framing lives in the tab / link preview, not the headline.
    const plainTitle = (r.title || "").replace(/<[^>]+>/g, "").trim();
    document.title = plainTitle ? `${plainTitle} — QA report` : "QA report";
    const verdict = (r.verdict || "pass").toLowerCase();
    const vlabel = {pass: "PASS", fail: "FAIL", partial: "PARTIAL"}[verdict] || verdict.toUpperCase();
    const vcls = {pass: "", fail: " fail", partial: " partial"}[verdict] || "";

    const byType = {};
    (DATA.blocks || []).forEach(b => { (byType[b.type] = byType[b.type] || []).push(b); });

    // Jump CTAs for the heavy evidence, only when those blocks exist.
    const ctas = [];
    if (byType.recording) ctas.push(`<a class="cta primary" href="#recording">${ICON.play} ${au("Watch recording")}</a>`);
    if (byType.userflows) ctas.push(`<a class="cta" href="#userflows">${ICON.flow} ${au("See userflows")}</a>`);
    const ctaRow = ctas.length ? `<div class="cta-row">${ctas.join("")}</div>` : "";

    // Metadata as a plain line, not pill badges.
    const metaItems = [`<span class="v${vcls}">${vlabel}</span>`].concat(
      (r.pills || []).map(p => typeof p === "string" ? `<span>${p}</span>` : `<span>${p.label} <span class="mono">${p.code}</span></span>`));
    const meta = `<div class="meta">${metaItems.join('<span class="sep">·</span>')}</div>`;

    const esc = s => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const clean = b => { const o = {}; for (const k in b) if (k[0] !== "_") o[k] = b[k]; return o; };
    const idOf = (b, i) => `blk-${i}-${b.type}`;
    const galleryBlocks = (DATA.blocks || []).filter(b => R[b.type]);
    let html = `<header class="gallery-cover"><p class="eyebrow">QA Report Template</p><h1>Block library</h1><p class="summary">The design blocks you can drop into a report. Each shows what the pattern looks like and the JSON that produces it.</p></header>`;

    galleryBlocks.forEach((b, i) => {
      html += `<section class="gallery-item" id="${idOf(b, i)}"><div class="gi-head"><h2 class="gi-name">${b._name || b.type}</h2>${b._note ? `<p class="gi-note">${b._note}</p>` : ""}</div><div class="gi-demo">${R[b.type](b)}</div><details class="gi-json"><summary>Show JSON</summary><pre><code>${esc(JSON.stringify(clean(b), null, 2))}</code></pre></details></section>`;
    });

    // 800px content column + 220px "On this page" nav listing every block type.
    const navLinks = galleryBlocks.map((b, i) => `<a href="#${idOf(b, i)}">${b._name || b.type}</a>`).join("");
    const statusLabel = vlabel ? vlabel[0] + vlabel.slice(1).toLowerCase() : "";
    const ttHtml = (r.testTypes || []).length ? `<div class="nm-field"><span class="nm-k">Test types</span><ul class="nm-types">${
      (r.testTypes || []).map(t => { const ok = (t.status || "pass").toLowerCase() === "pass"; return `<li class="${ok ? "ok" : "no"}"><span class="tt-ic">${ok ? ICON.check : ICON.x}</span>${au(t.name)}</li>`; }).join("")
    }</ul></div>` : "";
    const navMeta = `<div class="nav-meta">`
      + `<div class="nm-field"><span class="nm-k">Status</span><span class="nm-status${vcls}">${statusLabel}</span></div>`
      + (r.device ? `<div class="nm-field"><span class="nm-k">Device</span><span class="nm-val">${au(r.device)}</span></div>` : "")
      + (r.commit ? `<div class="nm-field"><span class="nm-k">Commit</span><span class="nm-val mono">${au(r.commit)}</span></div>` : "")
      + ttHtml
      + (r.timestamp ? `<div class="nm-when">${au(r.timestamp)}</div>` : "")
      + `</div>`;
    const nav = `<aside class="docs-nav"><nav><p class="nav-title">On this page</p>${navLinks}</nav></aside>`;

    document.getElementById("app").innerHTML = `<div class="docs"><div class="docs-main">${html}</div>${nav}</div>`;
    labelizeTables(document.getElementById("app"));

    // scroll-spy: highlight the section currently in view
    const links = new Map([...document.querySelectorAll(".docs-nav a")].map(a => [a.getAttribute("href").slice(1), a]));
    const spy = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (!e.isIntersecting) return;
        links.forEach(a => a.classList.remove("active"));
        const a = links.get(e.target.id);
        if (a) a.classList.add("active");
      });
    }, { rootMargin: "-15% 0px -75% 0px" });
    document.querySelectorAll(".docs-main .gallery-item[id]").forEach(s => spy.observe(s));
  }
  render();
</script>
</body>

</html>
